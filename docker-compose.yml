services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cra
      POSTGRES_PASSWORD: cra
      POSTGRES_DB: cra
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U cra"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: deploy/Dockerfile.mcp
    env_file: .env
    depends_on:
      - server

  web:
    build:
      context: ./web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata: {}
